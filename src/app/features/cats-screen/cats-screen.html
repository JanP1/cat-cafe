<div class="cat-screen-container">
  <div class="desc-panel-container">
    <div class="desc-panel">
      <div class="desc-title">
        Our Residents
      </div>
      <div class="desc-text">
        Cats that can be found in our Cafe.
      </div>

    </div>
  </div>
  <div class="cat-panel-container">
    @for (item of cats(); track item.id) {
      <app-cat-component
        [cat]="item"
        [isFront]="selectedCatId === item.id"
        (click)="selectCat(item.id)" />
    }
  </div>
</div>
