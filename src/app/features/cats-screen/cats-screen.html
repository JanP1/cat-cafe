<div class="cat-screen-container">

  <div class="cat-panel-container">


    <div class="gallery-container">


      <div class="desc-panel-container">
        <div class="desc-panel">
          <div class="desc-title">
            Our Residents
          </div>
          <div class="desc-text">
            Cats that can be found in our Cafe.
          </div>

        </div>
      </div>

      <div class="gallery-container"></div>
      @for (item of cats(); track item.id) {
        <app-cat-component
          [cat]="item"
          [position]="getPosition(item.id)"
          (click)="handleInteraction(item.id)"
        />
      }
    </div>
  </div>

</div>
