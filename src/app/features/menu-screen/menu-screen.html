<div class="menu-screen-container">
  <div class="menu-item-type-container">
    <div class="type-buttons-container">
      <div class="menu-type-button"><img class="menu-type-icon" src="/assets/icons/coffee_menu_icon.png" alt="coffee"></div>
      <div class="menu-type-button"><img class="menu-type-icon" src="/assets/icons/beverages_menu_icon.png" alt="beverages"></div>
      <div class="menu-type-button"><img class="menu-type-icon" src="/assets/icons/desserts_menu_icon.png" alt="desserts"></div>

    </div>
  </div>

  <div class="menu-items-container">
    @for (item of menuItems(); track item.id) {
      <app-menu-item-component [menuItem]="item" />
    }
  </div>
</div>
