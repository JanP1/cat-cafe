<div class="menu-item-container">
  <div class="menu-item-image-container">
    <img class="menu-item-image" [src]="menuItemImageUrl" alt="img">
  </div>
  <div class="menu-item-text-container">
    <div class="item-name">
      {{menuItem.name}}
    </div>
    <div class="item-desc">
      {{menuItem.description}}
    </div>
  </div>

  <div class="item-price">
    {{menuItem.price}} $
  </div>
</div>
